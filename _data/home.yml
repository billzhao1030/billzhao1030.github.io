research:
  heading: "Research"
  topics:
    - title: "Embodied AI"
      text: "Navigation agents that combine perception, memory, reasoning, and action in interactive environments."
    - title: "Multimodal Reasoning"
      text: "Large vision-language models for long-horizon planning, question answering, and scene understanding."
    - title: "Agentic AI"
      text: "Vision-language navigation agents that use multimodal observations, natural-language instructions, and step-by-step reasoning to plan actions in embodied environments."

